<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok TTS Generator</title>
<body>

<h2>TikTok TTS Generator</h2>

<textarea id="text" placeholder="Enter text..."></textarea>

<select id="voice">
<option value="en_us_001">English US Female 1</option>
<option value="en_us_006">English US Female 2</option>
<option value="en_us_007">English US Male 1</option>
<option value="en_us_009">English US Male 2</option>
<option value="en_uk_001">English UK Male 1</option>
<option value="en_uk_003">English UK Male 2</option>
<option value="en_au_001">English AU Female</option>
<option value="en_au_002">English AU Male</option>
<option value="fr_001">French Male</option>
<option value="fr_002">French Female</option>
<option value="de_001">German Female</option>
<option value="de_002">German Male</option>
<option value="es_002">Spanish Male</option>
<option value="es_mx_002">Spanish MX Male</option>
<option value="br_001">Portuguese BR Female</option>
<option value="br_003">Portuguese BR Male</option>
<option value="id_001">Indonesian Female</option>
<option value="jp_001">Japanese Female</option>
<option value="jp_003">Japanese Male</option>
<option value="kr_002">Korean Male</option>
<option value="ghostface">Ghostface</option>
<option value="chewbacca">Chewbacca</option>
<option value="c3po">C3PO</option>
<option value="stitch">Stitch</option>
<option value="stormtrooper">Stormtrooper</option>
<option value="rocket">Rocket</option>
<option value="wolverine">Wolverine</option>
</select>

<button onclick="generate()">Generate</button>

<audio id="audio" controls></audio>

<script>
async function generate() {
  const text = document.getElementById("text").value;
  const voice = document.getElementById("voice").value;

  const response = await fetch("https://tiktok-tts.weilnet.workers.dev/api/generation", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      text: text,
      voice: voice
    })
  });

  const data = await response.json();

  if (data.data) {
    const audio = document.getElementById("audio");
    audio.src = "data:audio/mpeg;base64," + data.data;
    audio.play();
  }
}
</script>

</body>
</html>
