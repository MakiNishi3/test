<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.tsl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.nodes.js"></script>
  
  
</head>
<body>

<button onclick="addObject()">Add Object</button>
<button onclick="removeObject()">Remove Object</button>
<select id="objectType">
<option>cube</option>
<option>sphere</option>
<option>box</option>
<option>cylinder</option>
<option>custom</option>
</select>

<button onclick="addEffect()">Add Effect</button>
<button onclick="removeEffect()">Remove Effect</button>
<select id="effectType">
<option>invert</option>
<option>huesaturation</option>
<option>swirl</option>
<option>pinch</option>
<option>bulge</option>
<option>cornerpin</option>
<option>lightness</option>
<option>wavewarp</option>
<option>kaleidoscope</option>
<option>anamorphic</option>
<option>lens</option>
<option>motiontile</option>
<option>randomwarp</option>
<option>rotate</option>
</select>

<input id="rx" type="range" min="0" max="6.28" step="0.01">
<input id="ry" type="range" min="0" max="6.28" step="0.01">
<input id="rz" type="range" min="0" max="6.28" step="0.01">

<script>
let scene=new THREE.Scene()
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)
let renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light=new THREE.PointLight(0xffffff,1)
light.position.set(10,10,10)
scene.add(light)

camera.position.z=5

let objects=[]
let composerMaterial=null

function createMaterial(){
return new THREE.ShaderMaterial({
uniforms:{tDiffuse:{value:null},time:{value:0}},
vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
fragmentShader:`uniform float time;varying vec2 vUv;void main(){vec2 uv=vUv;gl_FragColor=vec4(uv,abs(sin(time)),1.0);}`
})
}

function addObject(){
let type=document.getElementById("objectType").value
let geo
if(type==="cube")geo=new THREE.BoxGeometry()
if(type==="sphere")geo=new THREE.SphereGeometry()
if(type==="box")geo=new THREE.BoxGeometry(2,1,1)
if(type==="cylinder")geo=new THREE.CylinderGeometry()
if(type==="custom")geo=new THREE.TorusKnotGeometry()
let mat=new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
let mesh=new THREE.Mesh(geo,mat)
scene.add(mesh)
objects.push(mesh)
}

function removeObject(){
let obj=objects.pop()
if(obj){scene.remove(obj)}
}

function addEffect(){
let type=document.getElementById("effectType").value
composerMaterial=createMaterial()
if(type==="invert"){
composerMaterial.fragmentShader=`varying vec2 vUv;void main(){gl_FragColor=vec4(vec3(1.0-vUv.x,1.0-vUv.y,1.0),1.0);}`
}
if(type==="lightness"){
composerMaterial.fragmentShader=`varying vec2 vUv;void main(){gl_FragColor=vec4(vec3(vUv.x+vUv.y),1.0);}`
}
if(type==="rotate"){
composerMaterial.fragmentShader=`uniform float time;varying vec2 vUv;void main(){float a=time;mat2 r=mat2(cos(a),-sin(a),sin(a),cos(a));vec2 uv=r*(vUv-0.5)+0.5;gl_FragColor=vec4(uv,1.0,1.0);}`
}
}

function removeEffect(){
composerMaterial=null
}

function animate(t){
requestAnimationFrame(animate)
objects.forEach(o=>{
o.rotation.x=parseFloat(document.getElementById("rx").value||0)
o.rotation.y=parseFloat(document.getElementById("ry").value||0)
o.rotation.z=parseFloat(document.getElementById("rz").value||0)
})
renderer.render(scene,camera)
}
animate()
</script>

</body>
  </html>
